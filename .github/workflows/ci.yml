name: CI

on:
  push:
    branches: [main]
  pull_request:

# Minimal, read-only by default. No job in this workflow needs to write anything.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-pack:
    name: Build, test, pack (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore nugate.sln

      - name: Build
        run: dotnet build nugate.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test nugate.sln --no-build --configuration Release

      # Packaging smoke check: confirms both packages actually pack, not just build.
      # NuGate.Tool packing is stable and any failure here is a real CI failure.
      - name: Pack NuGate.Tool
        run: dotnet pack src/NuGate.Tool/NuGate.Tool.csproj --no-restore --configuration Release --output artifacts/packages

      - name: Pack NuGate.Build
        run: dotnet pack src/NuGate.Build/NuGate.Build.csproj --no-restore --configuration Release --output artifacts/packages

      # The task package's shape is a correctness property (tasks/ closure + build/ files);
      # verify it on every CI run, not only at release time.
      - name: Verify NuGate.Build package shape
        shell: pwsh
        run: |
          $nupkg = Get-ChildItem artifacts/packages -Filter 'NuGate.Build.*.nupkg' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          ./tests/NuGate.Build.Tests/verify-package.ps1 -NupkgPath $nupkg.FullName
